<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
</head>
<body>
  <nav class="top-menu">
    <a href="{{ '/' | relative_url }}#about-me">About</a>
    <a href="{{ '/' | relative_url }}#current-projects">Projects</a>
  </nav>

  <nav class="top-left-menu">
    <a href="https://www.linkedin.com/in/sajan-patel-duke/" target="_blank" aria-label="LinkedIn">
      <img src="{{ '/assets/tech-logos/linkedin.svg' | relative_url }}" alt="LinkedIn" class="linkedin-icon">
    </a>
  </nav>

  {{ content }}

  <div class="lightbox" id="lightbox">
    <img src="" alt="Expanded view">
  </div>

  <script>
    window.addEventListener("DOMContentLoaded", () => {
      const heroCard = document.getElementById("hero-card");
      const heroLeft = heroCard.querySelector(".hero-left");
      const heroRight = heroCard.querySelector(".hero-right");
      const animatedTitle = document.getElementById("animated-title");
      const siteTitle = "I'm Sajan Patel.";

      // 1. Set initial state
      heroCard.classList.add("pre-slide");
      heroCard.classList.remove("show-title", "profile-in", "final");
      animatedTitle.innerHTML = "";
      for (let i = 0; i < siteTitle.length; i++) {
        const span = document.createElement("span");
        span.textContent = siteTitle[i];
        if (siteTitle[i] === " ") span.style.whiteSpace = "pre";
        animatedTitle.appendChild(span);
      }

      // 2. Fade in card (still transparent, only title visible)
      setTimeout(() => {
        heroCard.classList.remove("pre-slide");
        heroCard.classList.add("show-title");
        // 3. Animate name letters
        let idx = 0;
        function showNextLetter() {
          if (idx < animatedTitle.children.length) {
            animatedTitle.children[idx].classList.add("visible");
            idx++;
            setTimeout(showNextLetter, 60);
          } else {
            // 4. Slide in profile pic
            setTimeout(() => {
              heroCard.classList.add("profile-in");
              // 5. Fade in rest of card and background
              setTimeout(() => {
                heroCard.classList.add("final");
              }, 400);
            }, 350);
          }
        }
        showNextLetter();
      }, 200);

      // Hide both menus after scrolling past hero
      const topMenu = document.querySelector('.top-menu');
      const topLeftMenu = document.querySelector('.top-left-menu');
      const heroSection = document.getElementById('hero');

      function handleMenuVisibility() {
        const heroRect = heroSection.getBoundingClientRect();
        if (heroRect.bottom <= 0) {
          if (topMenu) topMenu.style.display = 'none';
          if (topLeftMenu) topLeftMenu.style.display = 'none';
        } else {
          if (topMenu) topMenu.style.display = '';
          if (topLeftMenu) topLeftMenu.style.display = '';
        }
      }

      window.addEventListener('scroll', handleMenuVisibility, { passive: true });
      handleMenuVisibility();

    });
  </script>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      // Hobby data
      const hobbies = [
        {
          key: "running",
          img: "{{ '/assets/hobby-icons/running-portrait.jpg' | relative_url }}",
          desc: "Currently training for the 2025 Philadelphia Half-Marathon"
        },
        {
          key: "triathlon",
          img: "{{ '/assets/hobby-icons/triathlon-portrait.jpg' | relative_url }}",
          desc: "Long-term goal: complete an Ironman Triathlon"
        },
        {
          key: "reading",
          img: "{{ '/assets/hobby-icons/alchemist.jpg' | relative_url }}",
          desc: "My favorite book of all time is The Alchemist"
        }
      ];

      const tags = Array.from(document.querySelectorAll('.hobby-tag'));
      const img = document.getElementById('hobby-img');
      const desc = document.getElementById('hobby-desc');
      let idx = 1; // Start with triathlon (index 1)
      let interval;

      function selectHobby(i) {
        tags.forEach((tag, j) => tag.classList.toggle('selected', i === j));
        img.src = hobbies[i].img;
        img.alt = hobbies[i].key;
        desc.textContent = hobbies[i].desc;
        idx = i;
      }

      // Click to select hobby
      tags.forEach((tag, i) => {
        tag.addEventListener('click', () => {
          selectHobby(i);
          resetInterval();
        });
      });

      function nextHobby() {
        selectHobby((idx + 1) % hobbies.length);
      }

      function resetInterval() {
        clearInterval(interval);
        interval = setInterval(nextHobby, 3000);
      }

      // Initialize
      selectHobby(idx);
      interval = setInterval(nextHobby, 3000);
    });
  </script>

  <script>
    function setupCarousel(carouselId, intervalTime = 10000) {
      const carousel = document.getElementById(carouselId);
      if (!carousel) return;  // If the carousel doesn't exist on this page, stop here.
      
      const track = carousel.querySelector('.carousel-track');
      const slides = Array.from(track.children);
      const prevButton = carousel.querySelector('.prev');
      const nextButton = carousel.querySelector('.next');

      let currentIndex = 0;
      let interval;

      // --- NEW: adjust height to active slide ---
      function updateHeight() {
        const activeSlide = slides[currentIndex];
        if (activeSlide) {
          carousel.style.height = activeSlide.offsetHeight + "px";
        }
      }

      function updateSlide(index) {
        track.style.transform = `translateX(-${index * 100}%)`;
        updateHeight(); // update height whenever slide changes
      }

      function nextSlide() {
        currentIndex = (currentIndex + 1) % slides.length;
        updateSlide(currentIndex);
      }

      function prevSlide() {
        currentIndex = (currentIndex - 1 + slides.length) % slides.length;
        updateSlide(currentIndex);
      }

      function startAutoSlide() {
        interval = setInterval(nextSlide, intervalTime);
      }

      function resetAutoSlide() {
        clearInterval(interval);
        startAutoSlide();
      }

      nextButton.addEventListener('click', () => { nextSlide(); resetAutoSlide(); });
      prevButton.addEventListener('click', () => { prevSlide(); resetAutoSlide(); });

      // Initialize
      updateSlide(currentIndex);
      startAutoSlide();
    }

    // Initialize carousels
    document.addEventListener("DOMContentLoaded", () => {
      setupCarousel("carousel-proj-1", 5000);
      setupCarousel("carousel-proj-2", 6000);
    });
  </script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const lightbox = document.getElementById("lightbox");
      const lightboxImg = lightbox.querySelector("img");

      // Target only expandable images
      document.querySelectorAll(".expandable img").forEach(img => {
        img.addEventListener("click", () => {
          lightboxImg.src = img.src;
          lightbox.classList.add("active");
        });
      });

      // Close when clicking anywhere outside the image
      lightbox.addEventListener("click", (e) => {
        if (e.target !== lightboxImg) {
          lightbox.classList.remove("active");
        }
      });
    });
  </script>

</body>
</html>
